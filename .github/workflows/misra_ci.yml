name: MISRA Compliance CI-CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  misra-check:
    name: Build + MISRA Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools & cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc cppcheck

      - name: CMake Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: CMake Build
        run: cmake --build build --parallel $(nproc)

      - name: Run MISRA Analysis
        run: |
          mkdir -p reports
          cppcheck --enable=all --inconclusive --suppress=missingIncludeSystem src/ 2> reports/misra_report.txt || true
          echo "MISRA analysis completed"

      - name: Upload MISRA Report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: reports/
          if-no-files-found: warn

  send-email:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs: misra-check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: misra-report
          path: ./reports

      - name: Send email via EmailJS
        env:
          SERVICE_ID:  ${{ secrets.EMAILJS_SERVICE_ID }}
          TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          USER_ID:     ${{ secrets.EMAILJS_USER_ID }}
          PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          TO_EMAIL:    ${{ secrets.EMAILJS_RECIPIENT }}
        run: |
          # Count violations (subtract 1 for the header line cppcheck prints)
          if [ -f reports/misra_report.txt ] && [ -s reports/misra_report.txt ]; then
            VIOLATIONS=$(grep -c "\." reports/misra_report.txt || echo "0")
          else
            VIOLATIONS="0"
          fi

          # Set status label
          if [ "$VIOLATIONS" = "0" ]; then
            STATUS="PASS - No MISRA Violations"
          else
            STATUS="FAIL - ${VIOLATIONS} Violations Found"
          fi

          # Clean workflow URL (this actually works, unlike artifact URLs)
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H 'Content-Type: application/json' \
            -d "{
              \"service_id\":  \"${SERVICE_ID}\",
              \"template_id\": \"${TEMPLATE_ID}\",
              \"user_id\":     \"${USER_ID}\",
              \"accessToken\": \"${PRIVATE_KEY}\",
              \"template_params\": {
                \"to_email\":     \"${TO_EMAIL}\",
                \"to_name\":      \"Project Manager\",
                \"project_name\": \"Simple Webserver\",
                \"status\":       \"${STATUS}\",
                \"repo\":         \"${{ github.repository }}\",
                \"commit\":       \"${{ github.sha }}\",
                \"branch\":       \"${{ github.ref_name }}\",
                \"run_num\":      \"${{ github.run_number }}\",
                \"actor\":        \"${{ github.actor }}\",
                \"time\":         \"$(date '+%Y-%m-%d %H:%M:%S UTC')\",
                \"violations\":   \"${VIOLATIONS}\",
                \"workflow_link\": \"${WORKFLOW_URL}\"
              }
            }" | tee /tmp/emailjs_status.txt

          STATUS_CODE=$(cat /tmp/emailjs_status.txt)
          if [ "$STATUS_CODE" = "200" ]; then
            echo "Email sent successfully to ${TO_EMAIL}"
          else
            echo "EmailJS returned HTTP ${STATUS_CODE} — check service/template/user IDs in secrets"
            exit 1
          fi
